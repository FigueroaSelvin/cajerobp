<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajero Automático (ATM)</title>
    <link rel="stylesheet" href="1pantallalogo.css">
</head>

<body>

    <div class="video-container">
        <video src="BANPAIS VIDEO.mp4" loop muted autoplay></video>
    </div>


    <main class="app-container">

        <div id="notification" class="notification hidden">
            <span id="notif-message"></span>
        </div>


        <section id="view-welcome" class="view active">
            <button id="btn-ingresar" class="primary-btn pulse">Ingresar al Cajero</button>
        </section>


        <section id="view-login" class="view hidden glass-panel">
            <h2>Ingrese su PIN</h2>
            <div class="pin-display">
                <input type="password" id="pin-input" readonly maxlength="4">
            </div>
            <div class="keypad">
                <button class="key">1</button><button class="key">2</button><button class="key">3</button>
                <button class="key">4</button><button class="key">5</button><button class="key">6</button>
                <button class="key">7</button><button class="key">8</button><button class="key">9</button>
                <button class="key action-btn cancel" id="btn-cancel-login">X</button>
                <button class="key">0</button>
                <button class="key action-btn enter" id="btn-enter-pin">✓</button>
            </div>
            <p class="hint">PIN por defecto: 1234</p>
        </section>


        <section id="view-menu" class="view hidden glass-panel menu-panel">
            <div class="header">
                <h2>Menú Principal</h2>
                <button class="logout-btn" id="btn-logout">Salir</button>
            </div>
            <div class="grid-menu">
                <button class="menu-btn" data-target="view-balance">
                    <span class="icon">💰</span> Consultar Saldo
                </button>
                <button class="menu-btn" data-target="view-withdraw">
                    <span class="icon">💵</span> Retirar
                </button>
                <button class="menu-btn" data-target="view-deposit">
                    <span class="icon">📥</span> Depositar
                </button>
                <button class="menu-btn" data-target="view-transfer">
                    <span class="icon">💸</span> Transferir
                </button>
                <button class="menu-btn" data-target="view-payments">
                    <span class="icon">🧾</span> Pagar Servicios
                </button>
            </div>
        </section>


        <section id="view-balance" class="view hidden glass-panel form-panel">
            <h2>Saldo Disponible</h2>
            <div class="balance-amount" id="display-balance">L. 0.00</div>
            <button class="secondary-btn back-btn">Volver al Menú</button>
        </section>


        <section id="view-withdraw" class="view hidden glass-panel form-panel">
            <h2>Retirar Efectivo</h2>
            <p class="balance-info">Monto Disponible: <span class="current-balance-text"></span></p>
            <div class="input-group">
                <label for="withdraw-amount">Monto a retirar (L.)</label>
                <input type="number" id="withdraw-amount" placeholder="Ej. 500" min="1">
            </div>
            <div class="quick-amounts">
                <button class="quick-btn" data-val="100">100</button>
                <button class="quick-btn" data-val="500">500</button>
                <button class="quick-btn" data-val="1000">1000</button>
                <button class="quick-btn" data-val="2000">2000</button>
            </div>
            <div class="action-buttons">
                <button class="secondary-btn back-btn">Cancelar</button>
                <button class="primary-btn confirm-btn" id="btn-confirm-withdraw">Retirar</button>
            </div>
        </section>


        <section id="view-deposit" class="view hidden glass-panel form-panel">
            <h2>Depositar a Cuenta</h2>
            <div class="input-group">
                <label for="deposit-amount">Monto a depositar (L.)</label>
                <input type="number" id="deposit-amount" placeholder="Ej. 1000" min="1">
            </div>
            <div class="action-buttons">
                <button class="secondary-btn back-btn">Cancelar</button>
                <button class="primary-btn confirm-btn" id="btn-confirm-deposit">Depositar</button>
            </div>
        </section>


        <section id="view-transfer" class="view hidden glass-panel form-panel">
            <h2>Transferir Fondos</h2>
            <p class="balance-info">Monto Disponible: <span class="current-balance-text"></span></p>
            <div class="input-group">
                <label for="transfer-account">Número de Cuenta Destino</label>
                <input type="text" id="transfer-account" placeholder="Ej. 123456789">
            </div>
            <div class="input-group">
                <label for="transfer-amount">Monto a transferir (L.)</label>
                <input type="number" id="transfer-amount" placeholder="Ej. 500" min="1">
            </div>
            <div class="action-buttons">
                <button class="secondary-btn back-btn">Cancelar</button>
                <button class="primary-btn confirm-btn" id="btn-confirm-transfer">Transferir</button>
            </div>
        </section>


        <section id="view-payments" class="view hidden glass-panel form-panel">
            <h2>Pago de Servicios</h2>
            <p class="balance-info">Monto Disponible: <span class="current-balance-text"></span></p>
            <div class="input-group">
                <label for="payment-service">Seleccione un Servicio</label>
                <select id="payment-service">
                    <option value="" disabled selected>-- Seleccionar --</option>
                    <option value="ENEE">ENEE (Energía)</option>
                    <option value="SANAA">SANAA (Agua)</option>
                    <option value="Hondutel">Hondutel</option>
                    <option value="Tigo">Tigo (Internet/Telefonía)</option>
                    <option value="Claro">Claro (Internet/Telefonía)</option>
                </select>
            </div>
            <div class="input-group">
                <label for="payment-amount">Monto a pagar (L.)</label>
                <input type="number" id="payment-amount" placeholder="Ej. 350" min="1">
            </div>
            <div class="action-buttons">
                <button class="secondary-btn back-btn">Cancelar</button>
                <button class="primary-btn confirm-btn" id="btn-confirm-payment">Pagar</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
